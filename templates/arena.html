{% extends "base_joc.html" %}
{% block content_class %}pet-content-city{% endblock %}
{% block title %}Arenă{% endblock %}

{% block content %}
<div class="arena-wrap">
    <canvas id="arena-canvas"></canvas>
    <div id="arena-tooltip" class="city-tooltip"></div>

    <!-- Popup Corvin — meniu principal -->
    <div class="assets-popup-overlay" id="corvin-overlay">
        <div class="assets-popup">
            <button class="assets-popup-close" onclick="closeCorvinPopup()">✕</button>
            <div class="assets-popup-deco">⚔️</div>
            <div class="assets-popup-title">🗡️ Corvin Vargan</div>
            <button class="assets-popup-btn" id="btn-vorbeste" onclick="openCorvinDialog()">
                <span class="assets-popup-btn-icon">💬</span>
                <span>Vorbește cu omul</span>
            </button>
            <button class="assets-popup-btn" onclick="closeCorvinPopup()">
                <span class="assets-popup-btn-icon">⚔️</span>
                <span>Luptă în Arenă</span>
            </button>
            <button class="assets-popup-btn" onclick="closeCorvinPopup()">
                <span class="assets-popup-btn-icon">🏹</span>
                <span>Provoacă un alt cetățean</span>
            </button>
        </div>
    </div>

    <!-- Popup Dialog Corvin -->
    <div class="assets-popup-overlay" id="corvin-dialog-overlay">
        <div class="assets-popup assets-dialog">
            <button class="assets-popup-close" onclick="closeCorvinDialog()">✕</button>
            <div class="assets-popup-deco">⚔️</div>
            <div class="assets-popup-title">🗡️ Corvin Vargan</div>
            <div class="assets-dialog-text" id="corvin-dialog-text">
                <div class="assets-dialog-loading">Se încarcă...</div>
            </div>
            <div id="corvin-dialog-actions"></div>
        </div>
    </div>

    <!-- Buton Inapoi -->
    <a href="{{ url_for('oras') }}" class="room-care-btn"
       style="z-index:30; top:auto; bottom:14px; right:auto; left:14px;">
        ← Oraș
    </a>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/assets.css') }}">
<style>
.arena-wrap {
    position: relative;
    height: calc(100vh - var(--footbar-h));
    width: auto;
    aspect-ratio: 1287 / 816;
    max-width: calc(100vw - var(--sidebar-w));
    min-width: 0;
    max-height: calc((100vw - var(--sidebar-w)) * 816 / 1287);
    overflow: hidden;
    background: #0a0a0a;
    flex-shrink: 0;
}
#arena-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}
</style>
<script>
const W = 1287;
const H = 816;
const BASE = '/static/arena/';

const canvas  = document.getElementById('arena-canvas');
const ctx     = canvas.getContext('2d', { willReadFrequently: true });
const tooltip = document.getElementById('arena-tooltip');
const wrap    = canvas.parentElement;

canvas.width  = W;
canvas.height = H;

const bgImg     = new Image();
bgImg.crossOrigin = 'anonymous';
bgImg.src = BASE + 'ArenaBackground.png';

const corvinImg = new Image();
corvinImg.crossOrigin = 'anonymous';
corvinImg.src = BASE + 'CorvinVargan@0.5x.png';

const corvinOff = document.createElement('canvas');
corvinOff.width  = W;
corvinOff.height = H;

let loaded = 0;
function onLoad() {
    loaded++;
    if (loaded < 2) return;
    ctx.drawImage(bgImg,     0, 0, W, H);
    ctx.drawImage(corvinImg, 0, 0, W, H);
    const oc = corvinOff.getContext('2d', { willReadFrequently: true });
    oc.drawImage(corvinImg, 0, 0, W, H);
}
bgImg.onload     = onLoad;
corvinImg.onload = onLoad;

function redraw(hover) {
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(bgImg, 0, 0, W, H);
    ctx.drawImage(corvinImg, 0, 0, W, H);
    if (hover) {
        ctx.save();
        ctx.globalAlpha = 0.45;
        ctx.globalCompositeOperation = 'lighter';
        ctx.drawImage(corvinImg, 0, 0, W, H);
        ctx.restore();
    }
}

let lastHit      = 0;
let currentHover = false;
let popupOpen    = false;

canvas.addEventListener('mousemove', (e) => {
    if (popupOpen) return;
    if (currentHover) {
        tooltip.style.left = (e.clientX - wrap.getBoundingClientRect().left + 14) + 'px';
        tooltip.style.top  = (e.clientY - wrap.getBoundingClientRect().top  - 8)  + 'px';
    }
    const now = Date.now();
    if (now - lastHit < 33) return;
    lastHit = now;
    const rect  = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) * W / rect.width);
    const y = Math.floor((e.clientY - rect.top)  * H / rect.height);
    const oc    = corvinOff.getContext('2d', { willReadFrequently: true });
    const alpha = oc.getImageData(x, y, 1, 1).data[3];
    const hit   = alpha > 20;
    if (hit !== currentHover) {
        currentHover = hit;
        canvas.style.cursor   = hit ? 'pointer' : 'default';
        tooltip.style.opacity = hit ? '1' : '0';
        if (hit) tooltip.textContent = '🗡️ Corvin Vargan';
        redraw(hit);
    }
});

canvas.addEventListener('click', (e) => {
    const rect  = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) * W / rect.width);
    const y = Math.floor((e.clientY - rect.top)  * H / rect.height);
    const oc    = corvinOff.getContext('2d', { willReadFrequently: true });
    const alpha = oc.getImageData(x, y, 1, 1).data[3];
    if (alpha > 20) openCorvinPopup();
});

canvas.addEventListener('mouseleave', () => {
    tooltip.style.opacity = '0';
    canvas.style.cursor   = 'default';
    currentHover = false;
    redraw(false);
});

// ── Fade pulse ──
let isHovering = false;
let fadeAlpha  = 0;
let fadeDir    = 1;
let fadActive  = false;

function fadeStep() {
    if (isHovering) return;
    fadeAlpha += fadeDir * 0.05;
    if (fadeAlpha >= 1) {
        fadeAlpha = 1; fadeDir = -1;
    } else if (fadeAlpha <= 0) {
        fadeAlpha = 0; fadeDir = 1; fadActive = false;
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(bgImg, 0, 0, W, H);
        ctx.drawImage(corvinImg, 0, 0, W, H);
        return;
    }
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(bgImg, 0, 0, W, H);
    ctx.drawImage(corvinImg, 0, 0, W, H);
    ctx.save();
    ctx.globalAlpha = fadeAlpha * 0.35;
    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(corvinImg, 0, 0, W, H);
    ctx.restore();
    requestAnimationFrame(fadeStep);
}

setInterval(() => {
    if (isHovering || fadActive) return;
    fadActive = true; fadeAlpha = 0; fadeDir = 1;
    requestAnimationFrame(fadeStep);
}, 3000);

canvas.addEventListener('mouseenter', () => { isHovering = true; fadActive = false; });
canvas.addEventListener('mouseleave', () => { isHovering = false; redraw(false); });

// ── Popup Corvin ──
async function openCorvinPopup() {
    popupOpen    = true;
    isHovering   = true;
    fadActive    = false;
    currentHover = false;
    tooltip.style.opacity = '0';
    canvas.style.cursor   = 'default';

    // Verifica daca a vorbit deja
    const resp = await fetch('/joc/petomania/api/corvin');
    const data = await resp.json();
    if (data.ok && !data.first_time) {
        document.getElementById('btn-vorbeste').style.display = 'none';
    } else {
        document.getElementById('btn-vorbeste').style.display = 'flex';
    }

    document.getElementById('corvin-overlay').classList.add('open');
}
function closeCorvinPopup() {
    popupOpen  = false;
    isHovering = false;
    document.getElementById('corvin-overlay').classList.remove('open');
}
document.getElementById('corvin-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('corvin-overlay')) closeCorvinPopup();
});

// ── Dialog helpers ──
function formatText(text) {
    return text.split('\n').map(line =>
        line.startsWith('*') && line.endsWith('*')
            ? `<em class="assets-dialog-action">${line.slice(1,-1)}</em>`
            : `<span>${line}</span>`
    ).join('<br>');
}
function setDialogText(html) {
    document.getElementById('corvin-dialog-text').innerHTML = html;
}
function setDialogActions(html) {
    document.getElementById('corvin-dialog-actions').innerHTML = html;
}
function playerLine(text) {
    return `<span class="assets-dialog-player">— ${text}</span>`;
}
function corvinLine(text) {
    return `<span>${text}</span>`;
}
function actionLine(text) {
    return `<em class="assets-dialog-action">${text}</em>`;
}

// ── Dialog pas cu pas ──
let dialogStep = 0;

function openCorvinDialog() {
    closeCorvinPopup();
    dialogStep = 0;
    document.getElementById('corvin-dialog-overlay').classList.add('open');
    setDialogText(actionLine('Corvin Vargan te măsoară din priviri, cu brațele încrucișate.'));
    setDialogActions(`
        <button class="assets-popup-btn" onclick="corvinStep(1)">
            <span class="assets-popup-btn-icon">🤔</span>
            <span>Cum adică?</span>
        </button>
    `);
}

function corvinStep(step) {
    const textEl = document.getElementById('corvin-dialog-text');
    function append(html) {
        textEl.insertAdjacentHTML('beforeend', '<br>' + html);
        textEl.scrollTop = textEl.scrollHeight;
    }

    if (step === 1) {
        append(playerLine('Cum adică?'));
        append(corvinLine('Zâmbește doar într-un colț al gurii. Cum adică? Simplu. Unii oameni vin aici să privească și să-și imagineze cum ar fi fost dacă aveau curaj. Alții intră în arenă și află.'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(2)">
                <span class="assets-popup-btn-icon">👁️</span>
                <span>Și dacă vreau doar să văd despre ce e vorba?</span>
            </button>
        `);
    } else if (step === 2) {
        append(playerLine('Și dacă vreau doar să văd despre ce e vorba?'));
        append(corvinLine('Atunci ai venit în locul greșit. Privitul naște îndoială. Îndoiala naște frică. Iar frica îi face pe oameni să plece exact când ar fi putut câștiga.'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(3)">
                <span class="assets-popup-btn-icon">😒</span>
                <span>Nu pare foarte primitor.</span>
            </button>
        `);
    } else if (step === 3) {
        append(playerLine('Nu pare foarte primitor.'));
        append(actionLine('Râde scurt.'));
        append(corvinLine('Nu conduc o tavernă. Ofer oportunități. Diferența e că într-o tavernă plătești pentru o poveste. Aici ai șansa să devii una.'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(4)">
                <span class="assets-popup-btn-icon">😟</span>
                <span>Și dacă pierd?</span>
            </button>
        `);
    } else if (step === 4) {
        append(playerLine('Și dacă pierd?'));
        append(corvinLine('Toți pierd ceva. Timp, bani, mândrie. Întrebarea adevărată este ce câștigi dacă reușești. Cei care stau prea mult să cântărească riscurile ajung să privească de pe margine toată viața.'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(5)">
                <span class="assets-popup-btn-icon">🧐</span>
                <span>Parcă încerci să mă convingi.</span>
            </button>
        `);
    } else if (step === 5) {
        append(playerLine('Parcă încerci să mă convingi.'));
        append(corvinLine('Nu. Dacă ar trebui să te conving, n-ai ce căuta aici. Eu doar îți arăt ușa. Tu decizi dacă intri... sau dacă pleci și te întrebi mai târziu ce s-ar fi întâmplat.'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(6)">
                <span class="assets-popup-btn-icon">🛡️</span>
                <span>Și dacă nu sunt pregătit?</span>
            </button>
        `);
    } else if (step === 6) {
        append(playerLine('Și dacă nu sunt pregătit?'));
        append(actionLine('Își încrucișează brațele și te privește fix.'));
        append(corvinLine('Nimeni nu este pregătit. Cei care spun asta încearcă doar să-și cumpere timp. Întrebarea este: Companionul tău știe că stăpânul lui caută scuze? Sau încă mai crede că ai sânge de luptător?'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(7)">
                <span class="assets-popup-btn-icon">💰</span>
                <span>Ce câștig dacă intru?</span>
            </button>
        `);
    } else if (step === 7) {
        append(playerLine('Ce câștig dacă intru?'));
        append(actionLine('Își netezește mâneca și îți aruncă o privire calculată.'));
        append(corvinLine('Dacoins. Mai multe decât ai face într-o săptămână de muncă cinstită... dacă Companionul tău este pe cât de puternic crezi.'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(8)">
                <span class="assets-popup-btn-icon">🤑</span>
                <span>Și cât de multe?</span>
            </button>
        `);
    } else if (step === 8) {
        append(playerLine('Și cât de multe?'));
        append(corvinLine('Depinde de tine. Începătorii pleacă de obicei cu câteva sute. Cei buni cu mii. Iar cei despre care se vorbește prin oraș nu mai întreabă cât câștigă.'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(9)">
                <span class="assets-popup-btn-icon">🤨</span>
                <span>Sună prea frumos.</span>
            </button>
        `);
    } else if (step === 9) {
        append(playerLine('Sună prea frumos.'));
        append(actionLine('Zâmbește ușor.'));
        append(corvinLine('Atunci nu intra. Păstrează-ți îndoielile și lasă pe altcineva să ia Dacoins-ii care te așteptau pe tine.'));
        setDialogActions(`
            <button class="assets-popup-btn" onclick="corvinStep(10)">
                <span class="assets-popup-btn-icon">😰</span>
                <span>Și dacă pierd?</span>
            </button>
        `);
    } else if (step === 10) {
        append(playerLine('Și dacă pierd?'));
        append(corvinLine('Atunci afli cât valorează încrederea pe care o ai în Companionul tău. Dar spune-mi... dacă ești atât de sigur că vei pierde, de ce ai venit până aici?'));
        setDialogActions(`
            <button class="assets-popup-btn assets-name-btn" onclick="corvinStep(11)">
                <span class="assets-popup-btn-icon">✍️</span>
                <span>Prea bine. Pune-mă pe foaie.</span>
            </button>
        `);
    } else if (step === 11) {
        append(playerLine('Prea bine. Pune-mă pe foaie.'));
        append(corvinLine('Sânge proaspăt, deci. Foarte bine.'));
        setDialogActions('');
        // Salveaza in DB
        fetch('/joc/petomania/api/corvin/talked', {method: 'POST'});
        setTimeout(() => closeCorvinDialog(), 1500);
    }
}

function closeCorvinDialog() {
    document.getElementById('corvin-dialog-overlay').classList.remove('open');
    dialogStep = 0;
}
document.getElementById('corvin-dialog-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('corvin-dialog-overlay')) closeCorvinDialog();
});
</script>
{% endblock %}
